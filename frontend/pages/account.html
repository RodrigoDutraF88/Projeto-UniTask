<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniTask - Minha Conta</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #56dd51 0%, #2ff19d 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .account-card {
            background: white;
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 500px;
        }

        h1 {
            text-align: center;
            margin-bottom: 2rem;
            font-weight: 600;
            color: #1a1a1a;
        }

        .input-group {
            margin-bottom: 1.2rem;
        }

        label {
            display: block;
            font-size: 0.875rem;
            color: #666;
            margin-bottom: 0.5rem;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #22c55e;
            box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.2);
        }

        .button-group {
            margin-top: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .primary-btn {
            padding: 12px;
            background-color: #4f46e5;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .primary-btn:hover {
            background-color: #4338ca;
        }

        .danger-btn {
            padding: 12px;
            background-color: #ef4444;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .danger-btn:hover {
            background-color: #dc2626;
        }

        .secondary-btn {
            padding: 12px;
            background-color: #e5e7eb;
            color: #333;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .secondary-btn:hover {
            background-color: #d1d5db;
        }

        .info-text {
            margin-top: 1rem;
            font-size: 0.8rem;
            color: #6b7280;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="account-card">
        <h1>Minha Conta</h1>

        <div class="input-group">
            <label for="name">Nome</label>
            <input type="text" id="name" placeholder="Seu nome">
        </div>

        <div class="input-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="seu@email.com">
        </div>

        <div class="input-group">
            <label for="password">Nova Senha</label>
            <input type="password" id="password" placeholder="Digite nova senha">
        </div>

        <div class="button-group">
            <button class="primary-btn" onclick="saveChanges()">Salvar Alterações</button>
            <button class="secondary-btn" onclick="goHome()">Voltar para Home</button>
            <button class="danger-btn" onclick="deleteAccount()">Excluir Conta</button>
            <button class="secondary-btn" onclick="logout()">Logout</button>
        </div>

        <div class="info-text">
            UniTask © 2026
        </div>
    </div>

<script>
    function saveChanges() {
        alert("Alterações salvas! (Aqui conecta com o backend)");
    }

    function deleteAccount() {
        const confirmDelete = confirm("Tem certeza que deseja excluir sua conta?");
        if (confirmDelete) {
            alert("Conta excluída!");
            window.location.href = "login.html";
        }
    }

    function goHome() {
        window.location.href = "home.html";
    }

    function logout() {
        window.location.href = "login.html";
    }
</script>

</body>
</html>
