<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniTask - Home</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #56dd51 0%, #2ff19d 100%);
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 1000px;
            margin: auto;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            color: white;
        }

        .top-bar h1 {
            font-size: 2rem;
            font-weight: 600;
        }

        .top-bar button {
            background-color: #4f46e5;
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .top-bar button:hover {
            background-color: #4338ca;
        }

        .card {
            background: white;
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        .task-input {
            display: flex;
            gap: 10px;
            margin-bottom: 1.5rem;
        }

        .task-input input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        .task-input input:focus {
            border-color: #22c55e;
            box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.2);
        }

        .task-input button {
            background-color: #4f46e5;
            border: none;
            color: white;
            padding: 12px 18px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .task-input button:hover {
            background-color: #4338ca;
        }

        .task-list {
            list-style: none;
        }

        .task-item {
            background: #f9fafb;
            padding: 14px 16px;
            border-radius: 10px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.2s;
        }

        .task-item.completed span {
            text-decoration: line-through;
            color: #9ca3af;
        }

        .task-actions button {
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            cursor: pointer;
            margin-left: 5px;
            font-weight: 500;
        }

        .complete-btn {
            background: #22c55e;
            color: white;
        }

        .delete-btn {
            background: #ef4444;
            color: white;
        }

        .counter {
            margin-top: 1rem;
            font-size: 0.9rem;
            color: #6b7280;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="top-bar">
        <h1>Minhas Tarefas</h1>
        <div>
            <button onclick="alert('Minha Conta')">Minha Conta</button>
            <button onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="card">

        <div class="task-input">
            <input type="text" id="taskInput" placeholder="Digite uma nova tarefa...">
            <button onclick="addTask()">Adicionar</button>
        </div>

        <ul class="task-list" id="taskList"></ul>

        <div class="counter" id="counter">
            Total: 0 | Concluídas: 0
        </div>

    </div>

</div>

<script>
    let tasks = [];

    function addTask() {
        const input = document.getElementById("taskInput");
        const text = input.value.trim();

        if (text === "") {
            alert("Digite uma tarefa!");
            return;
        }

        tasks.push({
            id: Date.now(),
            text: text,
            completed: false
        });

        input.value = "";
        renderTasks();
    }

    function toggleTask(id) {
        tasks = tasks.map(task => {
            if (task.id === id) {
                task.completed = !task.completed;
            }
            return task;
        });
        renderTasks();
    }

    function deleteTask(id) {
        tasks = tasks.filter(task => task.id !== id);
        renderTasks();
    }

    function renderTasks() {
        const list = document.getElementById("taskList");
        list.innerHTML = "";

        tasks.forEach(task => {
            const li = document.createElement("li");
            li.className = "task-item";
            if (task.completed) li.classList.add("completed");

            li.innerHTML = `
                <span>${task.text}</span>
                <div class="task-actions">
                    <button class="complete-btn" onclick="toggleTask(${task.id})">
                        ${task.completed ? "Desfazer" : "Concluir"}
                    </button>
                    <button class="delete-btn" onclick="deleteTask(${task.id})">
                        Excluir
                    </button>
                </div>
            `;

            list.appendChild(li);
        });

        updateCounter();
    }

    function updateCounter() {
        const total = tasks.length;
        const completed = tasks.filter(t => t.completed).length;

        document.getElementById("counter").innerText =
            `Total: ${total} | Concluídas: ${completed}`;
    }

    function logout() {
        window.location.href = "login.html";
    }
</script>

</body>
</html>
