<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniTask - Home</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #56dd51 0%, #2ff19d 100%);
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 1100px;
            margin: auto;
        }

        /* ===== TOP BAR ===== */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            color: white;
        }

        /* ===== LOGO ===== */
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            border-radius: 13px;
            background: rgba(255,255,255,0.25);
            backdrop-filter: blur(8px);
            border: 1.5px solid rgba(255,255,255,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
            flex-shrink: 0;
        }

        .logo-icon svg {
            width: 28px;
            height: 28px;
        }

        .logo-wordmark {
            font-size: 1.9rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            line-height: 1;
            color: white;
            text-shadow: 0 2px 8px rgba(0,0,0,0.12);
        }

        .logo-wordmark span {
            color: rgba(255,255,255,0.75);
            font-weight: 600;
        }

        /* ===== BUTTONS ===== */
        .top-buttons {
            display: flex;
            gap: 10px;
        }

        .top-bar button {
            background-color: #4f46e5;
            border: none;
            color: white;
            padding: 9px 18px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.25s;
            box-shadow: 0 3px 10px rgba(79,70,229,0.35);
        }

        .top-bar button:hover {
            background-color: #4338ca;
            transform: translateY(-1px);
            box-shadow: 0 5px 14px rgba(79,70,229,0.45);
        }

        /* ===== MAIN LAYOUT ===== */
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 20px;
        }

        @media (max-width: 850px) {
            .main-content { grid-template-columns: 1fr; }
            .logo-wordmark { font-size: 1.5rem; }
        }

        .card {
            background: white;
            padding: 2rem;
            border-radius: 18px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.1);
            height: fit-content;
        }

        /* ===== CALENDAR ===== */
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .calendar-header h3 {
            font-size: 1rem;
            font-weight: 700;
            color: #1f2937;
        }

        .cal-nav {
            background: none;
            border: none;
            cursor: pointer;
            font-weight: 700;
            font-size: 1rem;
            color: #6b7280;
            width: 30px;
            height: 30px;
            border-radius: 8px;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cal-nav:hover {
            background: #f0fdf4;
            color: #22c55e;
            transform: none !important;
            box-shadow: none !important;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            text-align: center;
        }

        .day-name {
            font-weight: 600;
            font-size: 0.75rem;
            color: #9ca3af;
            margin-bottom: 4px;
            padding: 4px 0;
        }

        .day {
            padding: 9px 0;
            border-radius: 9px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: 0.2s;
            position: relative;
            color: #374151;
        }

        .day:hover { background-color: #f0fdf4; color: #16a34a; }
        .day.selected { background-color: #22c55e !important; color: white !important; font-weight: 700; box-shadow: 0 3px 10px rgba(34,197,94,0.4); }
        .day.today { border: 2px solid #4f46e5; font-weight: 700; }

        .has-task::after {
            content: '';
            position: absolute;
            bottom: 3px;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 4px;
            background-color: #4f46e5;
            border-radius: 50%;
        }

        .day.selected.has-task::after { background-color: white; }

        /* ===== TASKS ===== */
        .task-input {
            display: flex;
            gap: 10px;
            margin-bottom: 1.5rem;
        }

        .task-input input {
            flex: 1;
            padding: 12px 16px;
            border: 1.5px solid #e5e7eb;
            border-radius: 10px;
            outline: none;
            font-size: 0.9rem;
            transition: 0.3s;
            color: #374151;
        }

        .task-input input:focus {
            border-color: #22c55e;
            box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.15);
        }

        .task-input button {
            background-color: #4f46e5;
            border: none;
            color: white;
            padding: 12px 18px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.25s;
            box-shadow: 0 3px 10px rgba(79,70,229,0.3);
        }

        .task-input button:hover {
            background-color: #4338ca;
            transform: translateY(-1px);
        }

        .task-list { list-style: none; }

        .task-item {
            background: #f9fafb;
            padding: 13px 16px;
            border-radius: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1.5px solid #f3f4f6;
            transition: 0.2s;
        }

        .task-item:hover { border-color: #d1fae5; background: #f0fdf4; }
        .task-item.completed span { text-decoration: line-through; color: #9ca3af; }
        .task-item.completed { opacity: 0.7; }

        .task-item span { font-size: 0.9rem; color: #374151; }

        .task-btns { display: flex; gap: 6px; }

        .complete-btn {
            background: #22c55e;
            color: white;
            border: none;
            padding: 6px 13px;
            border-radius: 7px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            transition: 0.2s;
        }
        .complete-btn:hover { background: #16a34a; }

        .delete-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 6px 13px;
            border-radius: 7px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            transition: 0.2s;
        }
        .delete-btn:hover { background: #dc2626; }

        .selected-date-title {
            margin-bottom: 16px;
            color: #1f2937;
            font-size: 1.1rem;
            font-weight: 700;
        }

        .counter {
            margin-top: 14px;
            font-size: 0.85rem;
            color: #6b7280;
            font-weight: 500;
        }

        .counter strong { color: #22c55e; }
    </style>
</head>
<body>

<div class="container">
    <div class="top-bar">
        <!-- LOGO -->
        <a class="logo" href="#">
            <div class="logo-icon">
                <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <polyline points="4,14 10,21 18,8" stroke="white" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
                    <line x1="14" y1="10" x2="25" y2="10" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.65"/>
                    <line x1="14" y1="16" x2="23" y2="16" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.65"/>
                    <line x1="14" y1="22" x2="25" y2="22" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.65"/>
                </svg>
            </div>
            <div class="logo-wordmark">Uni<span>Task</span></div>
        </a>

        <div class="top-buttons">
            <button onclick="showAccount()">Minha Conta</button>
            <button onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="main-content">
        <div class="card">
            <div class="calendar-header">
                <button class="cal-nav" onclick="changeMonth(-1)">&lt;</button>
                <h3 id="monthTitle">Fevereiro 2026</h3>
                <button class="cal-nav" onclick="changeMonth(1)">&gt;</button>
            </div>
            <div class="calendar-grid" id="calendarGrid"></div>
        </div>

        <div class="card">
            <h3 class="selected-date-title" id="selectedDateDisplay">Tarefas de hoje</h3>
            <div class="task-input">
                <input type="text" id="taskInput" placeholder="O que precisa ser feito?" onkeydown="if(event.key==='Enter') addTask()">
                <button onclick="addTask()">Adicionar</button>
            </div>
            <ul class="task-list" id="taskList"></ul>
            <div class="counter" id="counter">Total no dia: 0 | Concluídas: 0</div>
        </div>
    </div>
</div>

<!-- Script antigo para funcionalidades de calendário -->
<script>
    let currentDate = new Date();
    let selectedDate = new Date().toDateString();

    const monthNames = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];

    function renderCalendar() {
        const grid = document.getElementById("calendarGrid");
        const monthTitle = document.getElementById("monthTitle");
        grid.innerHTML = "";

        const year = currentDate.getFullYear();
        const month = currentDate.getMonth();
        monthTitle.innerText = `${monthNames[month]} ${year}`;

        const daysOfWeek = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'];
        daysOfWeek.forEach(day => {
            const el = document.createElement("div");
            el.className = "day-name";
            el.innerText = day;
            grid.appendChild(el);
        });

        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();

        for (let i = 0; i < firstDay; i++) grid.appendChild(document.createElement("div"));

        for (let i = 1; i <= daysInMonth; i++) {
            const dayEl = document.createElement("div");
            const dateString = new Date(year, month, i).toDateString();
            dayEl.className = "day";
            dayEl.innerText = i;

            if (dateString === new Date().toDateString()) dayEl.classList.add("today");
            if (dateString === selectedDate) dayEl.classList.add("selected");

            dayEl.onclick = () => selectDate(dateString);
            grid.appendChild(dayEl);
        }
    }

    function selectDate(dateStr) {
        selectedDate = dateStr;
        const dateObj = new Date(dateStr);
        document.getElementById("selectedDateDisplay").innerText = `Tarefas de ${dateObj.getDate()}/${dateObj.getMonth() + 1}`;
        renderCalendar();
        // A atualização das tarefas será feita pelo TaskManager
        if(window.taskManager) {
            window.taskManager.updateSelectedDate(dateStr);
        }
    }

    function changeMonth(diff) {
        currentDate.setMonth(currentDate.getMonth() + diff);
        renderCalendar();
    }
</script>

<!-- Script principal com módulo para integração com backend -->
<script type="module">
    import { authAPI } from '../js/api.js';

    // Função para adicionar tarefa - chama a função do TaskManager
    function addTask() {
        const input = document.getElementById("taskInput");
        const text = input.value.trim();
        
        if(text === "") return;
        
        if(window.taskManager) {
            window.taskManager.addTask(text);
            input.value = "";
        }
    }

    // Função para logout
    function logout() {
        authAPI.logout();
        window.location.href = "./login.html";
    }

    // Função para mostrar conta
    function showAccount() {
        alert('Página de conta será implementada em breve!');
    }

    // Função para verificar autenticação
    document.addEventListener('DOMContentLoaded', function() {
        // Verifica se o usuário está autenticado
        if(!authAPI.isAuthenticated()) {
            // Se não estiver autenticado, redireciona para login
            window.location.href = "./login.html";
        }
        // Inicializa o TaskManager
        if(window.taskManager) {
            window.taskManager.updateSelectedDate(selectedDate);
        }
    });
</script>

<script type="module" src="../js/tasks.js"></script>

</body>
</html>
